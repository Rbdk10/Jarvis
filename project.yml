name: Jarvis
options:
  bundleIdPrefix: com.agrisol
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
configFiles:
  Debug: Secrets.xcconfig
  Release: Secrets.xcconfig
targets:
  Jarvis:
    type: application
    platform: iOS
    sources:
      - Jarvis
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agrisol.Jarvis
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: Jarvis/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
        DEVELOPMENT_TEAM: 6V4DVV45UP
